<body>
<div id="vignette"></div>
<div id="hud">
  <div class="hud-item">🌡 <span class="hud-label">TEMP</span><span id="temp">—°C</span></div>
  <div class="hud-item">💧 <span class="hud-label">AER</span><span id="umaer">—%</span></div>
  <div class="hud-item">🌱 <span class="hud-label">SOL</span><span id="umsol">—%</span></div>
  <div class="hud-item">💡 <span class="hud-label">LED</span><span id="led">—</span></div>
</div>
<div id="title">Seră · Digital Twin</div>
<div id="hint">⊙ drag · scroll zoom · click dreapta pan</div>
<div id="status">inițializare…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ─── CONFIG ────────────────────────────────────────────────
  const INFLUX_URL   = 'https://eu-central-1-1.aws.cloud2.influxdata.com/api/v2/query?org=aa5b3b6fd3a2e663';
  const INFLUX_TOKEN = 'cNd6iVxyPWimXbZF2aJrqCDkpXIV4OUXtJMWge2eGwpgesKwKhlw46l7LViKch0_RoB74qtbtR8QWXY8ElOsxA==';
  const FLUX_QUERY   = `from(bucket:"arduino_digitaltwin")
  |> range(start: -5m)
  |> filter(fn:(r) => r._measurement == "sera")
  |> last()`;
  const REFRESH_MS = 5000;

  // ─── RENDERER ──────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  // ─── SCENE ─────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x2a4a2a, 0.025);

  // Cer gradient shader
  const skyGeo = new THREE.SphereGeometry(60, 16, 8);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:    { value: new THREE.Color(0x1a3a5c) },
      bottomColor: { value: new THREE.Color(0x4a7a3a) },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor; uniform vec3 bottomColor;
      varying vec3 vWorldPos;
      void main() {
        float h = clamp(normalize(vWorldPos).y * 0.5 + 0.5, 0.0, 1.0);
        gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0);
      }`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // ─── CAMERA ────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 120);
  camera.position.set(8, 6, 10);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 3;
  controls.maxDistance = 25;
  controls.maxPolarAngle = Math.PI / 2.05;
  controls.target.set(0, 1.2, 0);

  // ─── LUMINI ────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xfff0e0, 0.8));
  const sun = new THREE.DirectionalLight(0xfff5d0, 3.5);
  sun.position.set(8, 14, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 50;
  sun.shadow.camera.left = -10;
  sun.shadow.camera.right = 10;
  sun.shadow.camera.top = 10;
  sun.shadow.camera.bottom = -10;
  sun.shadow.bias = -0.001;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0xc0d8ff, 1.2);
  fill.position.set(-6, 8, -6);
  scene.add(fill);
  scene.add(new THREE.HemisphereLight(0x88bb66, 0x3a5a20, 0.6));

  // ─── HELPER addBox ─────────────────────────────────────────
  function addBox(w, h, d, x, y, z, color, transp = false, opacity = 1) {
    const mat = new THREE.MeshStandardMaterial({
      color, transparent: transp, opacity,
      roughness: transp ? 0.03 : 0.85,
      metalness: transp ? 0.05 : 0.15,
      side: transp ? THREE.DoubleSide : THREE.FrontSide,
    });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = !transp;
    mesh.receiveShadow = true;
    scene.add(mesh);
    return mesh;
  }

  // ─── SOL ───────────────────────────────────────────────────
  const exteriorFloor = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0x3a5a25, roughness: 1.0 })
  );
  exteriorFloor.rotation.x = -Math.PI / 2;
  exteriorFloor.receiveShadow = true;
  scene.add(exteriorFloor);

  const solInterior = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1e3a10, roughness: 0.95 })
  );
  solInterior.rotation.x = -Math.PI / 2;
  solInterior.position.y = 0.005;
  solInterior.receiveShadow = true;
  scene.add(solInterior);

  const gridHelper = new THREE.GridHelper(6, 12, 0x2a4a18, 0x2a4a18);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  addBox(6, 0.08, 6, 0, 0, 0, 0x1e3a10);

  // ─── STRUCTURĂ SERĂ ────────────────────────────────────────
  addBox(0.05, 3, 6, -3, 1.5,  0, 0xaaddff, true, 0.15);
  addBox(0.05, 3, 6,  3, 1.5,  0, 0xaaddff, true, 0.15);
  addBox(6, 3, 0.05,  0, 1.5, -3, 0xaaddff, true, 0.15);
  // Perete față cu gol ușă
  addBox(2.2, 3, 0.05, -1.9, 1.5, 3, 0xaaddff, true, 0.15);
  addBox(2.2, 3, 0.05,  1.9, 1.5, 3, 0xaaddff, true, 0.15);
  addBox(6, 0.8, 0.05,  0, 2.6, 3, 0xaaddff, true, 0.15);

  // Acoperiș
  const roofMat = new THREE.MeshStandardMaterial({
    color: 0x99ccee, transparent: true, opacity: 0.18,
    roughness: 0.02, side: THREE.DoubleSide,
  });
  const roofL = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.06, 6.3), roofMat);
  roofL.position.set(-1.5, 3.55, 0); roofL.rotation.z = Math.PI / 6;
  scene.add(roofL);
  const roofR = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.06, 6.3), roofMat);
  roofR.position.set( 1.5, 3.55, 0); roofR.rotation.z = -Math.PI / 6;
  scene.add(roofR);

  // Cadru metalic
  const matFrame = new THREE.MeshStandardMaterial({ color: 0x5a7040, metalness: 0.4, roughness: 0.6 });
  [[-3,-3],[-3,0],[-3,3],[3,-3],[3,0],[3,3]].forEach(([x,z]) => {
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3.1, 8), matFrame);
    col.position.set(x, 1.55, z); col.castShadow = true; scene.add(col);
  });
  [[-3],[3]].forEach(([x]) => {
    const beam = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 6.1), matFrame);
    beam.position.set(x, 3.0, 0); scene.add(beam);
  });
  const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 6.2), matFrame);
  ridge.position.set(0, 4.18, 0); scene.add(ridge);
  for (let z = -2.5; z <= 2.5; z += 1.25) {
    const pL = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.05, 0.06), matFrame);
    pL.position.set(-1.5, 3.55, z); pL.rotation.z = Math.PI / 6; scene.add(pL);
    const pR = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.05, 0.06), matFrame);
    pR.position.set( 1.5, 3.55, z); pR.rotation.z = -Math.PI / 6; scene.add(pR);
  }

  // Ușă
  const matUsa = new THREE.MeshStandardMaterial({ color: 0x607850, metalness: 0.3, roughness: 0.7 });
  const usaL2 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.08), matUsa);
  usaL2.position.set(-0.8, 1.1, 3.0); scene.add(usaL2);
  const usaR2 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.08), matUsa);
  usaR2.position.set( 0.8, 1.1, 3.0); scene.add(usaR2);
  const usaTop2 = new THREE.Mesh(new THREE.BoxGeometry(1.68, 0.08, 0.08), matUsa);
  usaTop2.position.set(0, 2.2, 3.0); scene.add(usaTop2);
  addBox(1.55, 2.1, 0.04, 0, 1.05, 3.0, 0xaaddff, true, 0.10);
  const matManer = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.1 });
  const maner = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.22, 8), matManer);
  maner.rotation.x = Math.PI / 2;
  maner.position.set(0.5, 1.1, 3.06);
  scene.add(maner);

  // Jgheaburi irigare
  const matJgheab = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.5 });
  [-1, 1].forEach(row => {
    const jg = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.06, 0.10), matJgheab);
    jg.position.set(0, 0.04, row); scene.add(jg);
  });

  // ─── BENZI LED tavan ───────────────────────────────────────
  const ledStrips = [];
  const ledLights = [];
  [-1.5, 0, 1.5].forEach(z => {
    const stripMat = new THREE.MeshStandardMaterial({
      color: 0x333333, emissive: new THREE.Color(0xfff0aa),
      emissiveIntensity: 0, roughness: 0.3,
    });
    const strip = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.05, 0.07), stripMat);
    strip.position.set(0, 2.88, z);
    scene.add(strip);
    ledStrips.push(strip);
    const pt = new THREE.PointLight(0xfff5cc, 0, 5);
    pt.position.set(0, 2.75, z);
    scene.add(pt);
    ledLights.push(pt);
  });

  // Bec central
  const suport = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.025, 0.28, 8),
    new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 })
  );
  suport.position.set(0, 2.94, 0); scene.add(suport);
  const ledMat = new THREE.MeshStandardMaterial({
    color: 0x333333, emissive: 0xfff0aa, emissiveIntensity: 0, roughness: 0.1,
  });
  const ledBulb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 10), ledMat);
  ledBulb.position.set(0, 2.72, 0); scene.add(ledBulb);
  const ledLight = new THREE.PointLight(0xfff5cc, 0, 6);
  ledLight.position.copy(ledBulb.position); scene.add(ledLight);

  // ─── PLANTE DE ROȘII ───────────────────────────────────────
  const matTulpina    = new THREE.MeshStandardMaterial({ color: 0x4a7c30, roughness: 0.9 });
  const matFrunza     = new THREE.MeshStandardMaterial({ color: 0x2e6e1a, roughness: 0.8, side: THREE.DoubleSide });
  const matRosie      = new THREE.MeshStandardMaterial({ color: 0xcc2200, roughness: 0.35, metalness: 0.05 });
  const matRosieVerde = new THREE.MeshStandardMaterial({ color: 0x5a8a20, roughness: 0.5 });
  const matGhiveci    = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 1.0 });
  const matPamant     = new THREE.MeshStandardMaterial({ color: 0x3d2b1a, roughness: 1.0 });
  const matArac       = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });

  function addLeaf(ox, oy, oz, rotY, rotZ) {
    const geo = new THREE.SphereGeometry(0.17, 6, 4);
    geo.scale(1, 0.13, 0.5);
    const leaf = new THREE.Mesh(geo, matFrunza);
    leaf.position.set(ox, oy, oz);
    leaf.rotation.y = rotY; leaf.rotation.z = rotZ;
    leaf.castShadow = true; scene.add(leaf);
  }

  function addTomato(x, y, z, ripe = true) {
    const mat = ripe ? matRosie : matRosieVerde;
    const r = 0.08 + Math.random() * 0.04;
    const tom = new THREE.Mesh(new THREE.SphereGeometry(r, 9, 9), mat);
    tom.position.set(x, y, z); tom.castShadow = true; scene.add(tom);
    const calice = new THREE.Mesh(new THREE.ConeGeometry(0.033, 0.042, 5),
      new THREE.MeshStandardMaterial({ color: 0x3a6a10 }));
    calice.position.set(x, y + r + 0.013, z); scene.add(calice);
  }

  function addTomatoPlant(px, pz) {
    // Arac
    const arac = new THREE.Mesh(new THREE.CylinderGeometry(0.017, 0.017, 1.6, 6), matArac);
    arac.position.set(px + 0.14, 0.8, pz); scene.add(arac);

    // Ghiveci
    const ghiveci = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.16, 0.28, 10), matGhiveci);
    ghiveci.position.set(px, 0.14, pz); ghiveci.castShadow = true; scene.add(ghiveci);
    const pamant = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.20, 0.04, 10), matPamant);
    pamant.position.set(px, 0.27, pz); scene.add(pamant);

    // Mulci
    const mulci = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.03, 12),
      new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 1.0 }));
    mulci.position.set(px, 0.015, pz); scene.add(mulci);

    // Tulpină
    const segH = [0.38, 0.35, 0.32];
    const dev   = [[0.0,0.0],[0.03,-0.03],[-0.02,0.04]];
    let baseY = 0.28;
    for (let i = 0; i < 3; i++) {
      const seg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.028 - i*0.005, 0.038 - i*0.004, segH[i], 7), matTulpina);
      seg.position.set(px + dev[i][0], baseY + segH[i]/2, pz + dev[i][1]);
      seg.castShadow = true; scene.add(seg);
      baseY += segH[i];
    }
    const topY = baseY;

    // Ramuri
    const ramuri = [
      { h: 0.55, angle: 0.6,  side:  1, upY: 0.28 + 0.38*0.7 },
      { h: 0.50, angle:-0.5,  side: -1, upY: 0.28 + 0.38 + 0.35*0.5 },
      { h: 0.42, angle: 0.3,  side:  1, upY: 0.28 + 0.38 + 0.35 + 0.32*0.4 },
    ];
    ramuri.forEach(({ h, angle, side, upY }) => {
      const ram = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.022, h, 6), matTulpina);
      ram.position.set(px + side*h/2*Math.cos(angle), upY + h*0.28, pz + side*h/2*Math.sin(angle));
      ram.rotation.z = -side * 0.58; ram.castShadow = true; scene.add(ram);
      const tipX = px + side*h*Math.cos(angle)*0.88;
      const tipY = upY + h*0.52;
      const tipZ = pz + side*h*Math.sin(angle)*0.88;
      addLeaf(tipX,       tipY+0.06, tipZ,        angle,      0.3);
      addLeaf(tipX+0.11,  tipY+0.10, tipZ-0.06,   angle+1.0,  0.4);
      addLeaf(tipX-0.09,  tipY+0.08, tipZ+0.07,   angle-0.8, -0.35);
      const nrRosii = 1 + Math.floor(Math.random() * 3);
      for (let t = 0; t < nrRosii; t++) {
        addTomato(tipX+(Math.random()-0.5)*0.16, tipY-0.06+t*0.11,
                  tipZ+(Math.random()-0.5)*0.16, Math.random()>0.4);
      }
    });

    for (let i = 0; i < 4; i++) {
      const ang = (i/4)*Math.PI*2;
      addLeaf(px+Math.cos(ang)*0.21, topY-0.08+i*0.08, pz+Math.sin(ang)*0.21, ang, 0.5);
    }
    for (let t = 0; t < 3; t++) {
      const a = (t/3)*Math.PI*2;
      addTomato(px+Math.cos(a)*0.14, topY+0.04+t*0.10, pz+Math.sin(a)*0.14, t<2);
    }
  }

  [[-2,1.5],[-2,-1.5],[0,1.5],[0,-1.5],[2,1.5],[2,-1.5]].forEach(
    ([x,z]) => addTomatoPlant(x, z)
  );

  // ─── POMPĂ ─────────────────────────────────────────────────
  const pompaMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x1a3a8a, metalness: 0.7, roughness: 0.3 }));
  pompaMesh.position.set(-2.5, 0.12, 2.5); pompaMesh.castShadow = true; scene.add(pompaMesh);
  const tub = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 8),
    new THREE.MeshStandardMaterial({ color: 0x333355, metalness: 0.6 }));
  tub.position.set(-2.5, 0.45, 2.5); scene.add(tub);

  // ─── UPDATE LED ────────────────────────────────────────────
  function updateLED(val) {
    const on = val > 0.5;
    ledMat.emissiveIntensity = on ? 2.0 : 0;
    ledMat.color.set(on ? 0xfff0aa : 0x333333);
    ledLight.intensity = on ? 2.5 : 0;
    ledStrips.forEach((s, i) => {
      s.material.emissiveIntensity = on ? 1.8 : 0;
      s.material.color.set(on ? 0xfff0aa : 0x333333);
      ledLights[i].intensity = on ? 1.5 : 0;
    });
    const el = document.getElementById('led');
    el.textContent = on ? 'ON' : 'OFF';
    el.style.color = on ? '#ffe080' : '#b8ffcc';
  }

  // ─── INFLUXDB ──────────────────────────────────────────────
  function parseInfluxCSV(csv) {
    const result = {};
    const lines = csv.split('\n');
    let headers = null;
    for (const line of lines) {
      if (!line.trim() || line.startsWith('#')) continue;
      const cols = line.split(',');
      if (!headers) { headers = cols; continue; }
      const fi = headers.indexOf('_field');
      const vi = headers.indexOf('_value');
      if (fi < 0 || vi < 0) continue;
      if (cols[fi] && cols[vi] !== '') result[cols[fi]] = parseFloat(cols[vi]);
    }
    return result;
  }

  function fetchDate() {
    fetch(INFLUX_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Token ${INFLUX_TOKEN}`,
        'Content-Type': 'application/vnd.flux',
        'Accept': 'application/csv'
      },
      body: FLUX_QUERY
    })
    .then(r => r.text())
    .then(text => {
      const d = parseInfluxCSV(text);
      if (d.temperatura   !== undefined) document.getElementById('temp').textContent  = d.temperatura.toFixed(1) + '°C';
      if (d.umiditate_aer !== undefined) document.getElementById('umaer').textContent = d.umiditate_aer.toFixed(0) + '%';
      if (d.umiditate_sol !== undefined) document.getElementById('umsol').textContent = d.umiditate_sol.toFixed(0) + '%';
      if (d.led           !== undefined) updateLED(d.led);
      document.getElementById('status').textContent =
        'actualizat ' + new Date().toLocaleTimeString('ro-RO');
    })
    .catch(() => {
      document.getElementById('status').textContent = 'eroare fetch';
    });
  }

  fetchDate();
  setInterval(fetchDate, REFRESH_MS);

  // ─── RESIZE ────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ─── ANIMATE ───────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
