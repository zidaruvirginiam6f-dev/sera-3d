<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Seră 3D — Digital Twin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f0a; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
      z-index: 10;
    }
    #hud {
      position: absolute; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 7px;
      pointer-events: none; z-index: 20;
    }
    .hud-item {
      background: rgba(5,25,5,0.82);
      border: 1px solid rgba(0,255,80,0.25);
      border-left: 3px solid rgba(0,255,80,0.6);
      border-radius: 4px; padding: 5px 12px;
      color: #b8ffcc; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .hud-label { color: rgba(150,220,160,0.6); font-size: 10px; margin-right: 2px; }
    #hint { position: absolute; bottom: 12px; left: 16px; color: rgba(100,200,120,0.45); font-size: 11px; pointer-events: none; z-index: 20; }
    #status { position: absolute; bottom: 12px; right: 16px; color: rgba(100,200,120,0.45); font-size: 11px; pointer-events: none; z-index: 20; }
    #title { position: absolute; top: 16px; right: 16px; color: rgba(180,255,200,0.35); font-size: 11px; pointer-events: none; z-index: 20; letter-spacing: 0.12em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="vignette"></div>
<div id="hud">
  <div class="hud-item">🌡 <span class="hud-label">TEMP</span><span id="temp">—°C</span></div>
  <div class="hud-item">💧 <span class="hud-label">AER</span><span id="umaer">—%</span></div>
  <div class="hud-item">🌱 <span class="hud-label">SOL</span><span id="umsol">—%</span></div>
  <div class="hud-item">💡 <span class="hud-label">LED</span><span id="led">—</span></div>
</div>
<div id="title">Seră · Digital Twin</div>
<div id="hint">⊙ drag · scroll zoom</div>
<div id="status">inițializare…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ─── CONFIG ────────────────────────────────────────────────
  const INFLUX_URL   = 'https://eu-central-1-1.aws.cloud2.influxdata.com/api/v2/query?org=aa5b3b6fd3a2e663';
  const INFLUX_TOKEN = 'cNd6iVxyPWimXbZF2aJrqCDkpXIV4OUXtJMWge2eGwpgesKwKhlw46l7LViKch0_RoB74qtbtR8QWXY8ElOsxA==';
  const FLUX_QUERY   = `from(bucket:"arduino_digitaltwin")\n  |> range(start: -5m)\n  |> filter(fn:(r) => r._measurement == "sera")\n  |> last()`;
  const REFRESH_MS   = 5000;

  // ─── RENDERER ──────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  // ─── SCENE ─────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x2a4a2a, 0.022);

  // Cer gradient shader
  const skyGeo = new THREE.SphereGeometry(60, 16, 8);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:    { value: new THREE.Color(0x1a3a5c) },
      bottomColor: { value: new THREE.Color(0x4a7a3a) },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor; uniform vec3 bottomColor;
      varying vec3 vWorldPos;
      void main() {
        float h = clamp(normalize(vWorldPos).y * 0.5 + 0.5, 0.0, 1.0);
        gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0);
      }`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // ─── CAMERA ────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 120);
  camera.position.set(8, 6, 10);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 3;
  controls.maxDistance = 25;
  controls.maxPolarAngle = Math.PI / 2.05;
  controls.target.set(0, 1.2, 0);

  // ─── LUMINI ────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xfff0e0, 0.8));
  const sun = new THREE.DirectionalLight(0xfff5d0, 3.5);
  sun.position.set(8, 14, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 50;
  sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
  sun.shadow.camera.top  =  10; sun.shadow.camera.bottom = -10;
  sun.shadow.bias = -0.001;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0xc0d8ff, 1.2);
  fill.position.set(-6, 8, -6); scene.add(fill);
  scene.add(new THREE.HemisphereLight(0x88bb66, 0x3a5a20, 0.6));

  // ─── HELPER addBox ─────────────────────────────────────────
  function addBox(w, h, d, x, y, z, color, transp, opacity) {
    transp = transp || false; opacity = opacity || 1;
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      transparent: transp, opacity: opacity,
      roughness: transp ? 0.03 : 0.85,
      metalness: transp ? 0.05 : 0.15,
      side: transp ? THREE.DoubleSide : THREE.FrontSide,
    });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = !transp; mesh.receiveShadow = true;
    scene.add(mesh); return mesh;
  }

  function box(w, h, d, color) {
    return new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
      new THREE.MeshStandardMaterial({ color: color }));
  }

  // ─── SOL ───────────────────────────────────────────────────
  const extFloor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0x3a5a25, roughness: 1.0 }));
  extFloor.rotation.x = -Math.PI / 2;
  extFloor.receiveShadow = true;
  scene.add(extFloor);

  const solInt = new THREE.Mesh(new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1e3a10, roughness: 0.95 }));
  solInt.rotation.x = -Math.PI / 2;
  solInt.position.y = 0.005;
  solInt.receiveShadow = true;
  scene.add(solInt);

  const grid = new THREE.GridHelper(6, 12, 0x2a4a18, 0x2a4a18);
  scene.add(grid);

  addBox(6, 0.08, 6, 0, 0, 0, 0x1e3a10);

  // Cărare beton
  const carare = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 2.5),
    new THREE.MeshStandardMaterial({ color: 0x8a8a7a, roughness: 0.9 }));
  carare.rotation.x = -Math.PI / 2;
  carare.position.set(0, 0.006, 4.2);
  scene.add(carare);

  // ─── PEREȚI SERĂ ───────────────────────────────────────────
  addBox(0.05, 3, 6, -3, 1.5,  0, 0xaaddff, true, 0.15);
  addBox(0.05, 3, 6,  3, 1.5,  0, 0xaaddff, true, 0.15);
  addBox(6, 3, 0.05,  0, 1.5, -3, 0xaaddff, true, 0.15);
  addBox(2.2, 3, 0.05, -1.9, 1.5, 3, 0xaaddff, true, 0.15);
  addBox(2.2, 3, 0.05,  1.9, 1.5, 3, 0xaaddff, true, 0.15);
  addBox(6, 0.8, 0.05,  0, 2.6, 3, 0xaaddff, true, 0.15);

  // ─── ACOPERIȘ ──────────────────────────────────────────────
  const roofMat = new THREE.MeshStandardMaterial({
    color: 0x99ccee, transparent: true, opacity: 0.18,
    roughness: 0.02, side: THREE.DoubleSide,
  });
  const roofL = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.06, 6.3), roofMat);
  roofL.position.set(-1.5, 3.55, 0); roofL.rotation.z = Math.PI / 6; scene.add(roofL);
  const roofR = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.06, 6.3), roofMat);
  roofR.position.set(1.5, 3.55, 0); roofR.rotation.z = -Math.PI / 6; scene.add(roofR);

  // ─── CADRU METALIC ─────────────────────────────────────────
  const matFrame = new THREE.MeshStandardMaterial({ color: 0x5a7040, metalness: 0.4, roughness: 0.6 });
  [[-3,-3],[-3,0],[-3,3],[3,-3],[3,0],[3,3]].forEach(function(p) {
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3.1, 8), matFrame);
    col.position.set(p[0], 1.55, p[1]); col.castShadow = true; scene.add(col);
  });
  [-3, 3].forEach(function(x) {
    const beam = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 6.1), matFrame);
    beam.position.set(x, 3.0, 0); scene.add(beam);
  });
  const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 6.2), matFrame);
  ridge.position.set(0, 4.18, 0); scene.add(ridge);
  for (let z = -2.5; z <= 2.5; z += 1.25) {
    const pL = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.05, 0.06), matFrame);
    pL.position.set(-1.5, 3.55, z); pL.rotation.z = Math.PI / 6; scene.add(pL);
    const pR = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.05, 0.06), matFrame);
    pR.position.set(1.5, 3.55, z); pR.rotation.z = -Math.PI / 6; scene.add(pR);
  }

  // ─── UȘĂ ───────────────────────────────────────────────────
  const matUsa = new THREE.MeshStandardMaterial({ color: 0x607850, metalness: 0.3, roughness: 0.7 });
  var usaStanga = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.08), matUsa);
  usaStanga.position.set(-0.8, 1.1, 3.0); scene.add(usaStanga);
  var usaDreapta = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.08), matUsa);
  usaDreapta.position.set(0.8, 1.1, 3.0); scene.add(usaDreapta);
  var usaTop = new THREE.Mesh(new THREE.BoxGeometry(1.68, 0.08, 0.08), matUsa);
  usaTop.position.set(0, 2.2, 3.0); scene.add(usaTop);
  addBox(1.55, 2.1, 0.04, 0, 1.05, 3.0, 0xaaddff, true, 0.10);
  var maner = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.22, 8),
    new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 }));
  maner.rotation.x = Math.PI / 2;
  maner.position.set(0.5, 1.1, 3.06);
  scene.add(maner);

  // ─── VENTILATOR ────────────────────────────────────────────
  const matVent = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 });
  var ventFrame = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.52, 0.07), matVent);
  ventFrame.position.set(-2.96, 2.3, -1.0); scene.add(ventFrame);

  var ventRing = new THREE.Mesh(new THREE.TorusGeometry(0.20, 0.022, 8, 18),
    new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7 }));
  ventRing.position.set(-2.93, 2.3, -1.0);
  ventRing.rotation.y = Math.PI / 2;
  scene.add(ventRing);

  // Pale ventilator în grup separat pentru rotație
  const ventPaleGroup = new THREE.Group();
  ventPaleGroup.position.set(-2.93, 2.3, -1.0);
  ventPaleGroup.rotation.y = Math.PI / 2;
  for (let i = 0; i < 4; i++) {
    var pala = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.04, 0.015),
      new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5 }));
    var ang = (i / 4) * Math.PI * 2;
    pala.position.set(Math.cos(ang) * 0.09, Math.sin(ang) * 0.09, 0);
    pala.rotation.z = ang + 0.4;
    ventPaleGroup.add(pala);
  }
  scene.add(ventPaleGroup);

  // ─── SENZOR DHT PE PERETE ──────────────────────────────────
  var dhtBox = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.22, 0.05),
    new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 }));
  dhtBox.position.set(-2.94, 1.85, 1.5); scene.add(dhtBox);

  var dhtGrila = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.07, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x999999 }));
  dhtGrila.position.set(-2.91, 1.80, 1.5); scene.add(dhtGrila);

  var dhtLed = new THREE.Mesh(new THREE.SphereGeometry(0.018, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0x0044ff, emissive: 0x0044ff, emissiveIntensity: 2.0 }));
  dhtLed.position.set(-2.91, 1.93, 1.5); scene.add(dhtLed);

  // Cablu DHT simplu (box în loc de TubeGeometry)
  var cablu1 = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.3, 0.008),
    new THREE.MeshStandardMaterial({ color: 0x111111 }));
  cablu1.position.set(-2.91, 1.55, 1.5); scene.add(cablu1);

  // ─── JGHEABURI IRIGARE ─────────────────────────────────────
  const matJg = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.5 });
  [-1, 1].forEach(function(row) {
    var jg = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.06, 0.10), matJg);
    jg.position.set(0, 0.04, row); scene.add(jg);
  });

  // Tub principal irigare pe perete
  var tubMain = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 5.8),
    new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 }));
  tubMain.position.set(-2.75, 0.5, 0); scene.add(tubMain);

  // ─── BENZI LED TAVAN ───────────────────────────────────────
  const ledStrips = [];
  const ledLights = [];
  [-1.5, 0, 1.5].forEach(function(z) {
    var stripMat = new THREE.MeshStandardMaterial({
      color: 0x333333,
      emissive: new THREE.Color(0xfff0aa),
      emissiveIntensity: 0,
      roughness: 0.3,
    });
    var strip = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.05, 0.07), stripMat);
    strip.position.set(0, 2.88, z); scene.add(strip); ledStrips.push(strip);
    var pt = new THREE.PointLight(0xfff5cc, 0, 5);
    pt.position.set(0, 2.75, z); scene.add(pt); ledLights.push(pt);
  });

  // Bec central
  var suport = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.28, 8),
    new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 }));
  suport.position.set(0, 2.94, 0); scene.add(suport);

  const ledMat = new THREE.MeshStandardMaterial({
    color: 0x333333, emissive: 0xfff0aa, emissiveIntensity: 0, roughness: 0.1
  });
  var ledBulb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 10), ledMat);
  ledBulb.position.set(0, 2.72, 0); scene.add(ledBulb);
  var ledLight = new THREE.PointLight(0xfff5cc, 0, 6);
  ledLight.position.copy(ledBulb.position); scene.add(ledLight);

  // ─── PANOU DISPLAY 3D ──────────────────────────────────────
  // Ramă
  var rama = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.05, 0.07),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.85, roughness: 0.2 }));
  rama.position.set(1.6, 2.05, -2.96); scene.add(rama);

  // Suport
  var suportPanou = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.35, 0.06),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8 }));
  suportPanou.position.set(1.6, 1.37, -2.94); scene.add(suportPanou);
  var bazaPanou = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.04, 0.14),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8 }));
  bazaPanou.position.set(1.6, 1.19, -2.88); scene.add(bazaPanou);

  // Canvas ecran
  const displayCanvas = document.createElement('canvas');
  displayCanvas.width = 512; displayCanvas.height = 320;
  const dCtx = displayCanvas.getContext('2d');
  const displayTex = new THREE.CanvasTexture(displayCanvas);
  var screenMat = new THREE.MeshStandardMaterial({
    map: displayTex,
    emissiveMap: displayTex,
    emissive: new THREE.Color(0x111111),
    emissiveIntensity: 0.9,
    roughness: 0.05,
  });
  var screen = new THREE.Mesh(new THREE.BoxGeometry(1.56, 0.92, 0.02), screenMat);
  screen.position.set(1.6, 2.05, -2.92); scene.add(screen);

  // Lumina ecranului
  var screenLight = new THREE.PointLight(0x00ffaa, 0.3, 2.0);
  screenLight.position.set(1.6, 2.05, -2.65); scene.add(screenLight);

  // Date pentru display
  var dispData = { temperatura: null, umiditate_aer: null, umiditate_sol: null, led: null };

  function drawDisplay() {
    const W = 512, H = 320;
    // Fundal
    dCtx.fillStyle = '#020f06';
    dCtx.fillRect(0, 0, W, H);

    // Border
    dCtx.strokeStyle = '#00ff66';
    dCtx.lineWidth = 3;
    dCtx.strokeRect(5, 5, W-10, H-10);

    // Header
    dCtx.fillStyle = 'rgba(0,255,100,0.1)';
    dCtx.fillRect(5, 5, W-10, 44);
    dCtx.fillStyle = '#00ff88';
    dCtx.font = 'bold 17px monospace';
    dCtx.textAlign = 'center';
    dCtx.fillText('◈  SERĂ · DIGITAL TWIN  ◈', W/2, 31);

    // Ora
    dCtx.fillStyle = 'rgba(100,200,130,0.5)';
    dCtx.font = '11px monospace';
    dCtx.textAlign = 'right';
    dCtx.fillText(new Date().toLocaleTimeString('ro-RO'), W-12, 28);

    // Separator
    dCtx.strokeStyle = 'rgba(0,255,100,0.35)';
    dCtx.lineWidth = 1;
    dCtx.beginPath(); dCtx.moveTo(15, 51); dCtx.lineTo(W-15, 51); dCtx.stroke();

    // Funcție rând
    function row(icon, label, val, unit, y, color, warn) {
      dCtx.fillStyle = warn ? 'rgba(255,60,0,0.12)' : 'rgba(0,255,100,0.04)';
      dCtx.fillRect(12, y-24, W-24, 36);
      if (warn) {
        dCtx.strokeStyle = 'rgba(255,80,0,0.5)';
        dCtx.lineWidth = 1;
        dCtx.strokeRect(12, y-24, W-24, 36);
      }
      dCtx.fillStyle = 'rgba(140,210,155,0.65)';
      dCtx.font = '12px monospace';
      dCtx.textAlign = 'left';
      dCtx.fillText(icon + '  ' + label, 22, y);
      dCtx.fillStyle = warn ? '#ff6633' : color;
      dCtx.font = 'bold 21px monospace';
      dCtx.textAlign = 'right';
      dCtx.fillText(val !== null ? val + unit : '---', W-18, y);
    }

    var d = dispData;
    var tWarn = d.temperatura !== null && (d.temperatura > 35 || d.temperatura < 10);
    var aWarn = d.umiditate_aer !== null && d.umiditate_aer < 30;
    var sWarn = d.umiditate_sol !== null && d.umiditate_sol < 20;

    row('🌡', 'TEMPERATURA',  d.temperatura   !== null ? d.temperatura.toFixed(1)   : null, '°C', 94,  '#ff9944', tWarn);
    row('💧', 'UMID. AER',   d.umiditate_aer !== null ? d.umiditate_aer.toFixed(0)  : null, '%',  142, '#44ccff', aWarn);
    row('🌱', 'UMID. SOL',   d.umiditate_sol !== null ? d.umiditate_sol.toFixed(0)  : null, '%',  190, '#88dd44', sWarn);

    // LED row
    var ledOn = d.led !== null && d.led > 0.5;
    dCtx.fillStyle = ledOn ? 'rgba(255,230,60,0.1)' : 'rgba(0,255,100,0.04)';
    dCtx.fillRect(12, 214, W-24, 36);
    dCtx.fillStyle = 'rgba(140,210,155,0.65)';
    dCtx.font = '12px monospace'; dCtx.textAlign = 'left';
    dCtx.fillText('💡  LED GROW', 22, 238);
    dCtx.fillStyle = ledOn ? '#ffe040' : '#445544';
    dCtx.font = 'bold 18px monospace'; dCtx.textAlign = 'right';
    dCtx.fillText(d.led !== null ? (ledOn ? '● ON' : '○ OFF') : '---', W-18, 238);

    // Separator
    dCtx.strokeStyle = 'rgba(0,255,100,0.25)';
    dCtx.lineWidth = 1;
    dCtx.beginPath(); dCtx.moveTo(15, 257); dCtx.lineTo(W-15, 257); dCtx.stroke();

    // Footer
    dCtx.fillStyle = 'rgba(0,200,80,0.55)';
    dCtx.font = '11px monospace'; dCtx.textAlign = 'left';
    dCtx.fillText('● LIVE', 22, 278);
    dCtx.fillStyle = 'rgba(100,180,120,0.4)';
    dCtx.textAlign = 'center';
    dCtx.fillText('Arduino → InfluxDB → 3D', W/2, 278);

    // Dot pulsating
    var pulse = (Math.sin(Date.now() * 0.004) + 1) / 2;
    dCtx.fillStyle = 'rgba(0,255,100,' + (0.3 + pulse * 0.7) + ')';
    dCtx.beginPath(); dCtx.arc(W-20, 272, 5, 0, Math.PI*2); dCtx.fill();

    displayTex.needsUpdate = true;
  }

  // ─── PLANTE DE ROȘII ───────────────────────────────────────
  const matTulpina    = new THREE.MeshStandardMaterial({ color: 0x4a7c30, roughness: 0.9 });
  const matFrunza     = new THREE.MeshStandardMaterial({ color: 0x2e6e1a, roughness: 0.8, side: THREE.DoubleSide });
  const matRosie      = new THREE.MeshStandardMaterial({ color: 0xcc2200, roughness: 0.35, metalness: 0.05 });
  const matRosieVerde = new THREE.MeshStandardMaterial({ color: 0x5a8a20, roughness: 0.5 });
  const matGhiveci    = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 1.0 });
  const matPamant     = new THREE.MeshStandardMaterial({ color: 0x3d2b1a, roughness: 1.0 });
  const matArac       = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });

  function addLeaf(ox, oy, oz, rotY, rotZ) {
    var geo = new THREE.SphereGeometry(0.17, 6, 4);
    geo.scale(1, 0.13, 0.5);
    var leaf = new THREE.Mesh(geo, matFrunza);
    leaf.position.set(ox, oy, oz);
    leaf.rotation.y = rotY; leaf.rotation.z = rotZ;
    leaf.castShadow = true; scene.add(leaf);
  }

  function addTomato(x, y, z, ripe) {
    if (ripe === undefined) ripe = true;
    var mat = ripe ? matRosie : matRosieVerde;
    var r = 0.08 + Math.random() * 0.04;
    var tom = new THREE.Mesh(new THREE.SphereGeometry(r, 9, 9), mat);
    tom.position.set(x, y, z); tom.castShadow = true; scene.add(tom);
    var calice = new THREE.Mesh(new THREE.ConeGeometry(0.033, 0.042, 5),
      new THREE.MeshStandardMaterial({ color: 0x3a6a10 }));
    calice.position.set(x, y + r + 0.013, z); scene.add(calice);
  }

  function addTomatoPlant(px, pz) {
    // Arac
    var arac = new THREE.Mesh(new THREE.CylinderGeometry(0.017, 0.017, 1.6, 6), matArac);
    arac.position.set(px + 0.14, 0.8, pz); scene.add(arac);

    // Tub drip simplu
    var dripTub = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.015, 0.35),
      new THREE.MeshStandardMaterial({ color: 0x111111 }));
    dripTub.position.set(px + 0.05, 0.07, pz > 0 ? pz - 0.17 : pz + 0.17);
    scene.add(dripTub);

    // Senzor sol (știft galben)
    var stift = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.008, 0.2, 6),
      new THREE.MeshStandardMaterial({ color: 0xddaa00, metalness: 0.7 }));
    stift.position.set(px - 0.17, 0.1, pz); scene.add(stift);
    var stiftCap = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.035, 0.035),
      new THREE.MeshStandardMaterial({ color: 0x2244aa }));
    stiftCap.position.set(px - 0.17, 0.22, pz); scene.add(stiftCap);

    // Ghiveci
    var ghiveci = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.16, 0.28, 10), matGhiveci);
    ghiveci.position.set(px, 0.14, pz); ghiveci.castShadow = true; scene.add(ghiveci);
    var pamant = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.20, 0.04, 10), matPamant);
    pamant.position.set(px, 0.27, pz); scene.add(pamant);

    // Mulci
    var mulci = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.03, 12),
      new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 1.0 }));
    mulci.position.set(px, 0.015, pz); scene.add(mulci);

    // Tulpină
    var segH = [0.38, 0.35, 0.32];
    var dev   = [[0.0,0.0],[0.03,-0.03],[-0.02,0.04]];
    var baseY = 0.28;
    for (var i = 0; i < 3; i++) {
      var seg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.028-i*0.005, 0.038-i*0.004, segH[i], 7), matTulpina);
      seg.position.set(px+dev[i][0], baseY+segH[i]/2, pz+dev[i][1]);
      seg.castShadow = true; scene.add(seg);
      baseY += segH[i];
    }
    var topY = baseY;

    // Ramuri
    var ramuri = [
      { h: 0.55, angle: 0.6,  side:  1, upY: 0.28+0.38*0.7 },
      { h: 0.50, angle:-0.5,  side: -1, upY: 0.28+0.38+0.35*0.5 },
      { h: 0.42, angle: 0.3,  side:  1, upY: 0.28+0.38+0.35+0.32*0.4 },
    ];
    ramuri.forEach(function(r) {
      var ram = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.022, r.h, 6), matTulpina);
      ram.position.set(px+r.side*r.h/2*Math.cos(r.angle), r.upY+r.h*0.28, pz+r.side*r.h/2*Math.sin(r.angle));
      ram.rotation.z = -r.side*0.58; ram.castShadow = true; scene.add(ram);
      var tipX = px+r.side*r.h*Math.cos(r.angle)*0.88;
      var tipY = r.upY+r.h*0.52;
      var tipZ = pz+r.side*r.h*Math.sin(r.angle)*0.88;
      addLeaf(tipX,      tipY+0.06, tipZ,       r.angle,     0.3);
      addLeaf(tipX+0.11, tipY+0.10, tipZ-0.06,  r.angle+1.0, 0.4);
      addLeaf(tipX-0.09, tipY+0.08, tipZ+0.07,  r.angle-0.8,-0.35);
      var nrRosii = 1+Math.floor(Math.random()*3);
      for (var t = 0; t < nrRosii; t++) {
        addTomato(tipX+(Math.random()-0.5)*0.16, tipY-0.06+t*0.11,
                  tipZ+(Math.random()-0.5)*0.16, Math.random()>0.4);
      }
    });
    for (var i2 = 0; i2 < 4; i2++) {
      var ang2 = (i2/4)*Math.PI*2;
      addLeaf(px+Math.cos(ang2)*0.21, topY-0.08+i2*0.08, pz+Math.sin(ang2)*0.21, ang2, 0.5);
    }
    for (var t2 = 0; t2 < 3; t2++) {
      var a2 = (t2/3)*Math.PI*2;
      addTomato(px+Math.cos(a2)*0.14, topY+0.04+t2*0.10, pz+Math.sin(a2)*0.14, t2<2);
    }
  }

  [[-2,1.5],[-2,-1.5],[0,1.5],[0,-1.5],[2,1.5],[2,-1.5]].forEach(function(p) {
    addTomatoPlant(p[0], p[1]);
  });

  // ─── POMPĂ ─────────────────────────────────────────────────
  var pompa = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.28, 0.35),
    new THREE.MeshStandardMaterial({ color: 0x1a3a8a, metalness: 0.7, roughness: 0.3 }));
  pompa.position.set(-2.5, 0.14, 2.5); pompa.castShadow = true; scene.add(pompa);
  var tubPompa = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.55, 8),
    new THREE.MeshStandardMaterial({ color: 0x223366, metalness: 0.6 }));
  tubPompa.position.set(-2.5, 0.49, 2.5); scene.add(tubPompa);

  // ─── UPDATE LED ────────────────────────────────────────────
  function updateLED(val) {
    var on = val > 0.5;
    ledMat.emissiveIntensity = on ? 2.0 : 0;
    ledMat.color.set(on ? 0xfff0aa : 0x333333);
    ledLight.intensity = on ? 2.5 : 0;
    ledStrips.forEach(function(s, i) {
      s.material.emissiveIntensity = on ? 1.8 : 0;
      s.material.color.set(on ? 0xfff0aa : 0x333333);
      ledLights[i].intensity = on ? 1.5 : 0;
    });
    var el = document.getElementById('led');
    el.textContent = on ? 'ON' : 'OFF';
    el.style.color = on ? '#ffe080' : '#b8ffcc';
  }

  // ─── INFLUXDB ──────────────────────────────────────────────
  function parseInfluxCSV(csv) {
    var result = {};
    var lines = csv.split('\n');
    var headers = null;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!line.trim() || line.startsWith('#')) continue;
      var cols = line.split(',');
      if (!headers) { headers = cols; continue; }
      var fi = headers.indexOf('_field');
      var vi = headers.indexOf('_value');
      if (fi < 0 || vi < 0) continue;
      if (cols[fi] && cols[vi] !== '') result[cols[fi]] = parseFloat(cols[vi]);
    }
    return result;
  }

  function fetchDate() {
    fetch(INFLUX_URL, {
      method: 'POST',
      headers: {
        'Authorization': 'Token ' + INFLUX_TOKEN,
        'Content-Type': 'application/vnd.flux',
        'Accept': 'application/csv'
      },
      body: FLUX_QUERY
    })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var d = parseInfluxCSV(text);
      if (d.temperatura   !== undefined) { dispData.temperatura   = d.temperatura;   document.getElementById('temp').textContent  = d.temperatura.toFixed(1)+'°C'; }
      if (d.umiditate_aer !== undefined) { dispData.umiditate_aer = d.umiditate_aer; document.getElementById('umaer').textContent = d.umiditate_aer.toFixed(0)+'%'; }
      if (d.umiditate_sol !== undefined) { dispData.umiditate_sol = d.umiditate_sol; document.getElementById('umsol').textContent = d.umiditate_sol.toFixed(0)+'%'; }
      if (d.led           !== undefined) { dispData.led           = d.led;           updateLED(d.led); }
      document.getElementById('status').textContent = 'actualizat ' + new Date().toLocaleTimeString('ro-RO');
    })
    .catch(function() {
      document.getElementById('status').textContent = 'eroare fetch';
    });
  }

  fetchDate();
  setInterval(fetchDate, REFRESH_MS);

  // ─── RESIZE ────────────────────────────────────────────────
  window.addEventListener('resize', function() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ─── ANIMATE ───────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    ventPaleGroup.rotation.x += 0.05;
    drawDisplay();
    renderer.render(scene, camera);
  }
  animate();

</script>
</body>
</html>
