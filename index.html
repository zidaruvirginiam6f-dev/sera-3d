<!DOCTYPE html>

<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Seră 3D — Digital Twin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f0a; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
      z-index: 10;
    }
    #hud {
      position: absolute; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 7px;
      pointer-events: none; z-index: 20;
    }
    .hud-item {
      background: rgba(5,25,5,0.82);
      border: 1px solid rgba(0,255,80,0.25);
      border-left: 3px solid rgba(0,255,80,0.6);
      border-radius: 4px; padding: 5px 12px;
      color: #b8ffcc; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      letter-spacing: 0.03em;
    }
    .hud-label { color: rgba(150,220,160,0.6); font-size: 10px; margin-right: 2px; }
    #hint {
      position: absolute; bottom: 12px; left: 16px;
      color: rgba(100,200,120,0.45); font-size: 11px;
      pointer-events: none; z-index: 20; letter-spacing: 0.05em;
    }
    #status {
      position: absolute; bottom: 12px; right: 16px;
      color: rgba(100,200,120,0.45); font-size: 11px;
      pointer-events: none; z-index: 20;
    }
    #title {
      position: absolute; top: 16px; right: 16px;
      color: rgba(180,255,200,0.35); font-size: 11px;
      pointer-events: none; z-index: 20;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
  </style>
</head>
<body>
<div id="vignette"></div>
<div id="hud">
  <div class="hud-item">🌡 <span class="hud-label">TEMP</span><span id="temp">—°C</span></div>
  <div class="hud-item">💧 <span class="hud-label">AER</span><span id="umaer">—%</span></div>
  <div class="hud-item">🌱 <span class="hud-label">SOL</span><span id="umsol">—%</span></div>
  <div class="hud-item">💡 <span class="hud-label">LED</span><span id="led">—</span></div>
</div>
<div id="title">Seră · Digital Twin</div>
<div id="hint">⊙ drag · scroll zoom · click dreapta pan</div>
<div id="status">inițializare…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ─── CONFIG ────────────────────────────────────────────────
  const INFLUX_URL   = 'https://eu-central-1-1.aws.cloud2.influxdata.com/api/v2/query?org=aa5b3b6fd3a2e663';
  const INFLUX_TOKEN = 'cNd6iVxyPWimXbZF2aJrqCDkpXIV4OUXtJMWge2eGwpgesKwKhlw46l7LViKch0_RoB74qtbtR8QWXY8ElOsxA==';
  const FLUX_QUERY   = `from(bucket:"arduino_digitaltwin")
  |> range(start: -5m)
  |> filter(fn:(r) => r._measurement == "sera")
  |> last()`;
  const REFRESH_MS = 5000;

  // ─── RENDERER ──────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  // ─── SCENE ─────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x2a4a2a, 0.022);

  // Cer gradient
  const skyGeo = new THREE.SphereGeometry(60, 16, 8);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:    { value: new THREE.Color(0x1a3a5c) },
      bottomColor: { value: new THREE.Color(0x4a7a3a) },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor; uniform vec3 bottomColor;
      varying vec3 vWorldPos;
      void main() {
        float h = clamp(normalize(vWorldPos).y * 0.5 + 0.5, 0.0, 1.0);
        gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0);
      }`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // ─── CAMERA ────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 120);
  camera.position.set(8, 6, 10);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 3;
  controls.maxDistance = 25;
  controls.maxPolarAngle = Math.PI / 2.05;
  controls.target.set(0, 1.2, 0);

  // ─── LUMINI ────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xfff0e0, 0.8));
  const sun = new THREE.DirectionalLight(0xfff5d0, 3.5);
  sun.position.set(8, 14, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 50;
  sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
  sun.shadow.camera.top  =  10; sun.shadow.camera.bottom = -10;
  sun.shadow.bias = -0.001;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0xc0d8ff, 1.2);
  fill.position.set(-6, 8, -6); scene.add(fill);
  scene.add(new THREE.HemisphereLight(0x88bb66, 0x3a5a20, 0.6));

  // ─── HELPER ────────────────────────────────────────────────
  function addBox(w, h, d, x, y, z, color, transp = false, opacity = 1) {
    const mat = new THREE.MeshStandardMaterial({
      color, transparent: transp, opacity,
      roughness: transp ? 0.03 : 0.85,
      metalness: transp ? 0.05 : 0.15,
      side: transp ? THREE.DoubleSide : THREE.FrontSide,
    });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = !transp; mesh.receiveShadow = true;
    scene.add(mesh); return mesh;
  }

  // ─── SOL ───────────────────────────────────────────────────
  const extFloor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0x3a5a25, roughness: 1.0 }));
  extFloor.rotation.x = -Math.PI / 2; extFloor.receiveShadow = true; scene.add(extFloor);

  const solInt = new THREE.Mesh(new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1e3a10, roughness: 0.95 }));
  solInt.rotation.x = -Math.PI / 2; solInt.position.y = 0.005;
  solInt.receiveShadow = true; scene.add(solInt);

  scene.add(new THREE.GridHelper(6, 12, 0x2a4a18, 0x2a4a18));
  addBox(6, 0.08, 6, 0, 0, 0, 0x1e3a10);

  // Cărare beton la intrare
  const carare = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 2.0),
    new THREE.MeshStandardMaterial({ color: 0x8a8a7a, roughness: 0.9 }));
  carare.rotation.x = -Math.PI / 2; carare.position.set(0, 0.006, 4.0);
  scene.add(carare);

  // ─── STRUCTURĂ SERĂ ────────────────────────────────────────
  addBox(0.05, 3, 6, -3, 1.5,  0, 0xaaddff, true, 0.15);
  addBox(0.05, 3, 6,  3, 1.5,  0, 0xaaddff, true, 0.15);
  addBox(6, 3, 0.05,  0, 1.5, -3, 0xaaddff, true, 0.15);
  addBox(2.2, 3, 0.05, -1.9, 1.5, 3, 0xaaddff, true, 0.15);
  addBox(2.2, 3, 0.05,  1.9, 1.5, 3, 0xaaddff, true, 0.15);
  addBox(6, 0.8, 0.05,  0, 2.6, 3, 0xaaddff, true, 0.15);

  // Acoperiș
  const roofMat = new THREE.MeshStandardMaterial({
    color: 0x99ccee, transparent: true, opacity: 0.18,
    roughness: 0.02, side: THREE.DoubleSide,
  });
  const roofL = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.06, 6.3), roofMat);
  roofL.position.set(-1.5, 3.55, 0); roofL.rotation.z = Math.PI / 6; scene.add(roofL);
  const roofR = new THREE.Mesh(new THREE.BoxGeometry(3.3, 0.06, 6.3), roofMat);
  roofR.position.set( 1.5, 3.55, 0); roofR.rotation.z = -Math.PI / 6; scene.add(roofR);

  // Cadru metalic
  const matFrame = new THREE.MeshStandardMaterial({ color: 0x5a7040, metalness: 0.4, roughness: 0.6 });
  [[-3,-3],[-3,0],[-3,3],[3,-3],[3,0],[3,3]].forEach(([x,z]) => {
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3.1, 8), matFrame);
    col.position.set(x, 1.55, z); col.castShadow = true; scene.add(col);
  });
  [[-3],[3]].forEach(([x]) => {
    const beam = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 6.1), matFrame);
    beam.position.set(x, 3.0, 0); scene.add(beam);
  });
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 6.2), matFrame),
    { position: new THREE.Vector3(0, 4.18, 0) }));
  for (let z = -2.5; z <= 2.5; z += 1.25) {
    const pL = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.05, 0.06), matFrame);
    pL.position.set(-1.5, 3.55, z); pL.rotation.z = Math.PI / 6; scene.add(pL);
    const pR = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.05, 0.06), matFrame);
    pR.position.set( 1.5, 3.55, z); pR.rotation.z = -Math.PI / 6; scene.add(pR);
  }

  // ── Ușă ──
  const matUsa = new THREE.MeshStandardMaterial({ color: 0x607850, metalness: 0.3, roughness: 0.7 });
  [[-0.8, 1.1, 3.0],[0.8, 1.1, 3.0]].forEach(([x,y,z]) => {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.2, 0.08), matUsa);
    p.position.set(x,y,z); scene.add(p);
  });
  const usaTop = new THREE.Mesh(new THREE.BoxGeometry(1.68, 0.08, 0.08), matUsa);
  usaTop.position.set(0, 2.2, 3.0); scene.add(usaTop);
  addBox(1.55, 2.1, 0.04, 0, 1.05, 3.0, 0xaaddff, true, 0.10);
  const maner = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.22, 8),
    new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 }));
  maner.rotation.x = Math.PI / 2; maner.position.set(0.5, 1.1, 3.06); scene.add(maner);

  // ── Ventilator pe perete stânga ──
  const matVent = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.7, roughness: 0.3 });
  const ventFrame = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.08), matVent);
  ventFrame.position.set(-2.96, 2.3, -1.0); scene.add(ventFrame);
  // Grila ventilator
  const ventGrila = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.025, 8, 20),
    new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 }));
  ventGrila.position.set(-2.93, 2.3, -1.0); ventGrila.rotation.y = Math.PI/2; scene.add(ventGrila);
  // Pale ventilator (rotesc în animate)
  const ventPaleGroup = new THREE.Group();
  ventPaleGroup.position.set(-2.93, 2.3, -1.0);
  for (let i = 0; i < 4; i++) {
    const pala = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.05, 0.02),
      new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.6 }));
    pala.position.set(Math.cos(i*Math.PI/2)*0.09, Math.sin(i*Math.PI/2)*0.09, 0);
    pala.rotation.z = i * Math.PI/2 + 0.3;
    ventPaleGroup.add(pala);
  }
  ventPaleGroup.rotation.y = Math.PI/2;
  scene.add(ventPaleGroup);

  // ── Senzor DHT pe perete ──
  const matDHT = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 });
  const dhtBox = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.24, 0.06), matDHT);
  dhtBox.position.set(-2.94, 1.8, 1.5); scene.add(dhtBox);
  // Grila DHT
  const dhtGrila = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x888888 }));
  dhtGrila.position.set(-2.91, 1.75, 1.5); scene.add(dhtGrila);
  // LED mic albastru pe DHT
  const dhtLedMat = new THREE.MeshStandardMaterial({
    color: 0x0044ff, emissive: 0x0044ff, emissiveIntensity: 1.5 });
  const dhtLed = new THREE.Mesh(new THREE.SphereGeometry(0.02, 6, 6), dhtLedMat);
  dhtLed.position.set(-2.91, 1.9, 1.5); scene.add(dhtLed);
  // Cablu DHT
  const cableCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-2.91, 1.68, 1.5),
    new THREE.Vector3(-2.91, 1.4,  1.5),
    new THREE.Vector3(-2.91, 1.2,  1.4),
  ]);
  const cableGeo = new THREE.TubeGeometry(cableCurve, 10, 0.008, 6, false);
  scene.add(new THREE.Mesh(cableGeo,
    new THREE.MeshStandardMaterial({ color: 0x222222 })));

  // ── Jgheaburi irigare ──
  const matJgheab = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.5 });
  [-1, 1].forEach(row => {
    const jg = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.06, 0.10), matJgheab);
    jg.position.set(0, 0.04, row); scene.add(jg);
  });

  // ─── BENZI LED tavan ───────────────────────────────────────
  const ledStrips = [];
  const ledLights = [];
  [-1.5, 0, 1.5].forEach(z => {
    const stripMat = new THREE.MeshStandardMaterial({
      color: 0x333333, emissive: new THREE.Color(0xfff0aa),
      emissiveIntensity: 0, roughness: 0.3,
    });
    const strip = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.05, 0.07), stripMat);
    strip.position.set(0, 2.88, z); scene.add(strip); ledStrips.push(strip);
    const pt = new THREE.PointLight(0xfff5cc, 0, 5);
    pt.position.set(0, 2.75, z); scene.add(pt); ledLights.push(pt);
  });

  const suport = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.28, 8),
    new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 }));
  suport.position.set(0, 2.94, 0); scene.add(suport);
  const ledMat = new THREE.MeshStandardMaterial({
    color: 0x333333, emissive: 0xfff0aa, emissiveIntensity: 0, roughness: 0.1 });
  const ledBulb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 10), ledMat);
  ledBulb.position.set(0, 2.72, 0); scene.add(ledBulb);
  const ledLight = new THREE.PointLight(0xfff5cc, 0, 6);
  ledLight.position.copy(ledBulb.position); scene.add(ledLight);

  // ─── PANOU DISPLAY 3D ──────────────────────────────────────
  // Ramă panou
  const matRama = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.85, roughness: 0.2 });
  const rama = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.05, 0.07), matRama);
  rama.position.set(1.6, 2.05, -2.96); scene.add(rama);

  // Suport panou (picior)
  const suportPanou = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.35, 0.06), matRama);
  suportPanou.position.set(1.6, 1.36, -2.94); scene.add(suportPanou);
  const bazaPanou = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.04, 0.15), matRama);
  bazaPanou.position.set(1.6, 1.18, -2.88); scene.add(bazaPanou);

  // Canvas ecran
  const displayCanvas = document.createElement('canvas');
  displayCanvas.width = 512; displayCanvas.height = 320;
  const dCtx = displayCanvas.getContext('2d');
  const displayTex = new THREE.CanvasTexture(displayCanvas);
  const screenMat = new THREE.MeshStandardMaterial({
    map: displayTex,
    emissiveMap: displayTex,
    emissive: new THREE.Color(0x111111),
    emissiveIntensity: 0.85,
    roughness: 0.05,
  });
  const screen = new THREE.Mesh(new THREE.BoxGeometry(1.56, 0.92, 0.02), screenMat);
  screen.position.set(1.6, 2.05, -2.92); scene.add(screen);

  // Lumina ecranului în seră
  const screenLight = new THREE.PointLight(0x00ffaa, 0.35, 2.0);
  screenLight.position.set(1.6, 2.05, -2.7); scene.add(screenLight);

  // Date curente afișate pe ecran
  let dispData = { temperatura: null, umiditate_aer: null, umiditate_sol: null, led: null };

  function drawDisplay() {
    const W = 512, H = 320;
    dCtx.fillStyle = '#020f06';
    dCtx.fillRect(0, 0, W, H);

    // Border glow
    dCtx.strokeStyle = '#00ff66';
    dCtx.lineWidth = 3;
    dCtx.strokeRect(6, 6, W-12, H-12);
    dCtx.strokeStyle = 'rgba(0,255,100,0.2)';
    dCtx.lineWidth = 8;
    dCtx.strokeRect(3, 3, W-6, H-6);

    // Header
    dCtx.fillStyle = 'rgba(0,255,100,0.12)';
    dCtx.fillRect(6, 6, W-12, 44);
    dCtx.fillStyle = '#00ff88';
    dCtx.font = 'bold 18px monospace';
    dCtx.textAlign = 'center';
    dCtx.fillText('◈  SERĂ · DIGITAL TWIN  ◈', W/2, 33);

    // Linie separator
    dCtx.strokeStyle = 'rgba(0,255,100,0.4)';
    dCtx.lineWidth = 1;
    dCtx.beginPath(); dCtx.moveTo(20, 52); dCtx.lineTo(W-20, 52); dCtx.stroke();

    // Timestamp
    dCtx.fillStyle = 'rgba(100,200,130,0.5)';
    dCtx.font = '11px monospace';
    dCtx.textAlign = 'right';
    dCtx.fillText(new Date().toLocaleTimeString('ro-RO'), W-16, 48);

    // Funcție rând date
    function drawRow(label, value, unit, y, color, warn) {
      // Background rând
      dCtx.fillStyle = warn ? 'rgba(255,60,0,0.1)' : 'rgba(0,255,100,0.05)';
      dCtx.fillRect(16, y-22, W-32, 34);
      if (warn) {
        dCtx.strokeStyle = 'rgba(255,80,0,0.4)';
        dCtx.lineWidth = 1;
        dCtx.strokeRect(16, y-22, W-32, 34);
      }
      // Label
      dCtx.fillStyle = 'rgba(150,220,160,0.7)';
      dCtx.font = '12px monospace';
      dCtx.textAlign = 'left';
      dCtx.fillText(label, 28, y);
      // Valoare
      dCtx.fillStyle = warn ? '#ff6633' : color;
      dCtx.font = 'bold 22px monospace';
      dCtx.textAlign = 'center';
      dCtx.fillText(value !== null ? value : '---', W/2 + 20, y);
      // Unitate
      dCtx.fillStyle = 'rgba(150,220,160,0.5)';
      dCtx.font = '13px monospace';
      dCtx.textAlign = 'right';
      dCtx.fillText(unit, W-28, y);
    }

    const d = dispData;
    const tempWarn = d.temperatura !== null && (d.temperatura > 35 || d.temperatura < 10);
    const aerWarn  = d.umiditate_aer !== null && d.umiditate_aer < 30;
    const solWarn  = d.umiditate_sol !== null && d.umiditate_sol < 20;

    drawRow('🌡  TEMPERATURA',
      d.temperatura !== null ? d.temperatura.toFixed(1) : null, '°C', 98, '#ff9944', tempWarn);
    drawRow('💧  UMIDITATE AER',
      d.umiditate_aer !== null ? d.umiditate_aer.toFixed(0) : null, '%',  148, '#44ccff', aerWarn);
    drawRow('🌱  UMIDITATE SOL',
      d.umiditate_sol !== null ? d.umiditate_sol.toFixed(0) : null, '%',  198, '#88dd44', solWarn);

    // LED status
    const ledOn = d.led !== null && d.led > 0.5;
    dCtx.fillStyle = ledOn ? 'rgba(255,230,80,0.15)' : 'rgba(0,255,100,0.05)';
    dCtx.fillRect(16, 216, W-32, 34);
    dCtx.fillStyle = 'rgba(150,220,160,0.7)';
    dCtx.font = '12px monospace'; dCtx.textAlign = 'left';
    dCtx.fillText('💡  LED GROW', 28, 238);
    dCtx.fillStyle = ledOn ? '#ffe040' : '#556655';
    dCtx.font = 'bold 18px monospace'; dCtx.textAlign = 'center';
    dCtx.fillText(d.led !== null ? (ledOn ? '● ON' : '○ OFF') : '---', W/2+20, 238);

    // Linie separator
    dCtx.strokeStyle = 'rgba(0,255,100,0.3)';
    dCtx.lineWidth = 1;
    dCtx.beginPath(); dCtx.moveTo(20, 258); dCtx.lineTo(W-20, 258); dCtx.stroke();

    // Status bar
    dCtx.fillStyle = 'rgba(0,200,80,0.5)';
    dCtx.font = '11px monospace'; dCtx.textAlign = 'left';
    dCtx.fillText('● LIVE', 28, 280);
    dCtx.fillStyle = 'rgba(100,180,120,0.4)';
    dCtx.textAlign = 'center';
    dCtx.fillText('Arduino → InfluxDB → 3D', W/2, 280);

    // Pulsating dot
    const pulse = (Math.sin(Date.now() * 0.004) + 1) / 2;
    dCtx.fillStyle = `rgba(0,255,100,${0.3 + pulse * 0.7})`;
    dCtx.beginPath();
    dCtx.arc(W-28, 274, 5, 0, Math.PI*2);
    dCtx.fill();

    displayTex.needsUpdate = true;
  }

  // ─── PLANTE DE ROȘII ───────────────────────────────────────
  const matTulpina    = new THREE.MeshStandardMaterial({ color: 0x4a7c30, roughness: 0.9 });
  const matFrunza     = new THREE.MeshStandardMaterial({ color: 0x2e6e1a, roughness: 0.8, side: THREE.DoubleSide });
  const matRosie      = new THREE.MeshStandardMaterial({ color: 0xcc2200, roughness: 0.35, metalness: 0.05 });
  const matRosieVerde = new THREE.MeshStandardMaterial({ color: 0x5a8a20, roughness: 0.5 });
  const matGhiveci    = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 1.0 });
  const matPamant     = new THREE.MeshStandardMaterial({ color: 0x3d2b1a, roughness: 1.0 });
  const matArac       = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });
  const matTub        = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });

  function addLeaf(ox, oy, oz, rotY, rotZ) {
    const geo = new THREE.SphereGeometry(0.17, 6, 4);
    geo.scale(1, 0.13, 0.5);
    const leaf = new THREE.Mesh(geo, matFrunza);
    leaf.position.set(ox, oy, oz);
    leaf.rotation.y = rotY; leaf.rotation.z = rotZ;
    leaf.castShadow = true; scene.add(leaf);
  }

  function addTomato(x, y, z, ripe = true) {
    const mat = ripe ? matRosie : matRosieVerde;
    const r = 0.08 + Math.random() * 0.04;
    const tom = new THREE.Mesh(new THREE.SphereGeometry(r, 9, 9), mat);
    tom.position.set(x, y, z); tom.castShadow = true; scene.add(tom);
    const calice = new THREE.Mesh(new THREE.ConeGeometry(0.033, 0.042, 5),
      new THREE.MeshStandardMaterial({ color: 0x3a6a10 }));
    calice.position.set(x, y + r + 0.013, z); scene.add(calice);
  }

  function addTomatoPlant(px, pz) {
    // Arac
    const arac = new THREE.Mesh(new THREE.CylinderGeometry(0.017, 0.017, 1.6, 6), matArac);
    arac.position.set(px + 0.14, 0.8, pz); scene.add(arac);

    // Tub drip irigare (tub negru subțire la ghiveci)
    const dripCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(px, 0.06, pz > 0 ? pz - 0.28 : pz + 0.28),
      new THREE.Vector3(px, 0.06, pz),
      new THREE.Vector3(px + 0.1, 0.15, pz),
    ]);
    const dripGeo = new THREE.TubeGeometry(dripCurve, 8, 0.012, 5, false);
    scene.add(new THREE.Mesh(dripGeo, matTub));
    // Picurător mic
    const picurator = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.012, 0.04, 6), matTub);
    picurator.position.set(px + 0.1, 0.12, pz); scene.add(picurator);

    // Senzor umiditate sol (știft lângă plantă)
    const stift = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.008, 0.22, 6),
      new THREE.MeshStandardMaterial({ color: 0xddaa00, metalness: 0.7 }));
    stift.position.set(px - 0.18, 0.11, pz); scene.add(stift);
    const stiftCap = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.04, 0.04),
      new THREE.MeshStandardMaterial({ color: 0x3355aa }));
    stiftCap.position.set(px - 0.18, 0.24, pz); scene.add(stiftCap);

    // Ghiveci
    const ghiveci = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.16, 0.28, 10), matGhiveci);
    ghiveci.position.set(px, 0.14, pz); ghiveci.castShadow = true; scene.add(ghiveci);
    const pamant = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.20, 0.04, 10), matPamant);
    pamant.position.set(px, 0.27, pz); scene.add(pamant);

    // Mulci
    const mulci = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.03, 12),
      new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 1.0 }));
    mulci.position.set(px, 0.015, pz); scene.add(mulci);

    // Tulpină
    const segH = [0.38, 0.35, 0.32];
    const dev   = [[0.0,0.0],[0.03,-0.03],[-0.02,0.04]];
    let baseY = 0.28;
    for (let i = 0; i < 3; i++) {
      const seg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.028-i*0.005, 0.038-i*0.004, segH[i], 7), matTulpina);
      seg.position.set(px+dev[i][0], baseY+segH[i]/2, pz+dev[i][1]);
      seg.castShadow = true; scene.add(seg);
      baseY += segH[i];
    }
    const topY = baseY;

    // Ramuri
    const ramuri = [
      { h: 0.55, angle: 0.6,  side:  1, upY: 0.28+0.38*0.7 },
      { h: 0.50, angle:-0.5,  side: -1, upY: 0.28+0.38+0.35*0.5 },
      { h: 0.42, angle: 0.3,  side:  1, upY: 0.28+0.38+0.35+0.32*0.4 },
    ];
    ramuri.forEach(({ h, angle, side, upY }) => {
      const ram = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.022, h, 6), matTulpina);
      ram.position.set(px+side*h/2*Math.cos(angle), upY+h*0.28, pz+side*h/2*Math.sin(angle));
      ram.rotation.z = -side*0.58; ram.castShadow = true; scene.add(ram);
      const tipX = px+side*h*Math.cos(angle)*0.88;
      const tipY = upY+h*0.52;
      const tipZ = pz+side*h*Math.sin(angle)*0.88;
      addLeaf(tipX,      tipY+0.06, tipZ,       angle,     0.3);
      addLeaf(tipX+0.11, tipY+0.10, tipZ-0.06,  angle+1.0, 0.4);
      addLeaf(tipX-0.09, tipY+0.08, tipZ+0.07,  angle-0.8,-0.35);
      const nrRosii = 1+Math.floor(Math.random()*3);
      for (let t = 0; t < nrRosii; t++) {
        addTomato(tipX+(Math.random()-0.5)*0.16, tipY-0.06+t*0.11,
                  tipZ+(Math.random()-0.5)*0.16, Math.random()>0.4);
      }
    });
    for (let i = 0; i < 4; i++) {
      const ang = (i/4)*Math.PI*2;
      addLeaf(px+Math.cos(ang)*0.21, topY-0.08+i*0.08, pz+Math.sin(ang)*0.21, ang, 0.5);
    }
    for (let t = 0; t < 3; t++) {
      const a = (t/3)*Math.PI*2;
      addTomato(px+Math.cos(a)*0.14, topY+0.04+t*0.10, pz+Math.sin(a)*0.14, t<2);
    }
  }

  [[-2,1.5],[-2,-1.5],[0,1.5],[0,-1.5],[2,1.5],[2,-1.5]].forEach(([x,z]) => addTomatoPlant(x,z));

  // Tub principal irigare (pe perete spate)
  const tubPrincipal = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 5.8),
    new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 }));
  tubPrincipal.position.set(-2.8, 0.5, 0); scene.add(tubPrincipal);

  // ─── POMPĂ ─────────────────────────────────────────────────
  const pompaMesh = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.28, 0.35),
    new THREE.MeshStandardMaterial({ color: 0x1a3a8a, metalness: 0.7, roughness: 0.3 }));
  pompaMesh.position.set(-2.5, 0.14, 2.5); pompaMesh.castShadow = true; scene.add(pompaMesh);
  // Etichetă pompă
  const pompaLabel = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.10, 0.01),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 }));
  pompaLabel.position.set(-2.5, 0.16, 2.68); scene.add(pompaLabel);
  const tub2 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.55, 8),
    new THREE.MeshStandardMaterial({ color: 0x333355, metalness: 0.6 }));
  tub2.position.set(-2.5, 0.48, 2.5); scene.add(tub2);

  // ─── UPDATE LED ────────────────────────────────────────────
  function updateLED(val) {
    const on = val > 0.5;
    ledMat.emissiveIntensity = on ? 2.0 : 0;
    ledMat.color.set(on ? 0xfff0aa : 0x333333);
    ledLight.intensity = on ? 2.5 : 0;
    ledStrips.forEach((s, i) => {
      s.material.emissiveIntensity = on ? 1.8 : 0;
      s.material.color.set(on ? 0xfff0aa : 0x333333);
      ledLights[i].intensity = on ? 1.5 : 0;
    });
    const el = document.getElementById('led');
    el.textContent = on ? 'ON' : 'OFF';
    el.style.color = on ? '#ffe080' : '#b8ffcc';
  }

  // ─── INFLUXDB ──────────────────────────────────────────────
  function parseInfluxCSV(csv) {
    const result = {};
    const lines = csv.split('\n');
    let headers = null;
    for (const line of lines) {
      if (!line.trim() || line.startsWith('#')) continue;
      const cols = line.split(',');
      if (!headers) { headers = cols; continue; }
      const fi = headers.indexOf('_field');
      const vi = headers.indexOf('_value');
      if (fi < 0 || vi < 0) continue;
      if (cols[fi] && cols[vi] !== '') result[cols[fi]] = parseFloat(cols[vi]);
    }
    return result;
  }

  function fetchDate() {
    fetch(INFLUX_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Token ${INFLUX_TOKEN}`,
        'Content-Type': 'application/vnd.flux',
        'Accept': 'application/csv'
      },
      body: FLUX_QUERY
    })
    .then(r => r.text())
    .then(text => {
      const d = parseInfluxCSV(text);
      if (d.temperatura   !== undefined) { dispData.temperatura   = d.temperatura;   document.getElementById('temp').textContent  = d.temperatura.toFixed(1)+'°C'; }
      if (d.umiditate_aer !== undefined) { dispData.umiditate_aer = d.umiditate_aer; document.getElementById('umaer').textContent = d.umiditate_aer.toFixed(0)+'%'; }
      if (d.umiditate_sol !== undefined) { dispData.umiditate_sol = d.umiditate_sol; document.getElementById('umsol').textContent = d.umiditate_sol.toFixed(0)+'%'; }
      if (d.led           !== undefined) { dispData.led           = d.led;           updateLED(d.led); }
      document.getElementById('status').textContent = 'actualizat '+new Date().toLocaleTimeString('ro-RO');
    })
    .catch(() => {
      document.getElementById('status').textContent = 'eroare fetch';
    });
  }

  fetchDate();
  setInterval(fetchDate, REFRESH_MS);

  // ─── RESIZE ────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ─── ANIMATE ───────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    // Rotire pale ventilator
    ventPaleGroup.rotation.x += 0.04;
    // Redesenare display live
    drawDisplay();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
